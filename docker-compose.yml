# ============================================================================
# bimeg-dbprecios — orquestación de servicios
# ============================================================================
# Dos modos de ejecución:
#
#   LOCAL (desarrollo, con DB en el equipo):
#       docker-compose --profile local up -d
#       → levanta: n8n + scraper + postgres + postgrest
#       → .env debe tener SUPABASE_URL=http://postgrest:3000
#
#   PRODUCCIÓN (DB en Supabase cloud):
#       docker-compose up -d
#       → levanta: n8n + scraper solamente
#       → .env debe tener SUPABASE_URL=https://xxxx.supabase.co
#
# Todos los secretos viven en .env (no committeado). Ver .env.example.
# ============================================================================

services:

  # ==========================================================================
  # n8n — orquestador de workflows
  # ==========================================================================
  n8n:
    image: n8nio/n8n:2.19.2
    container_name: bimeg-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      # ---- Autenticación — n8n 2.x usa user management propio ------------
      # En el primer run abre el wizard para crear la cuenta admin.
      # N8N_BASIC_AUTH_ACTIVE fue removido en v2.x.
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}

      # ---- Timezone para cron triggers ------------------------------------
      TZ: ${TZ}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}

      # ---- Variables consumidas via $env dentro de workflows --------------
      # Los nodos HTTP referencian estas con {{ $env.NOMBRE }}.
      # En modo local SUPABASE_URL apunta a http://postgrest:3000
      # En modo prod SUPABASE_URL apunta a https://xxxx.supabase.co
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SCRAPER_URL: ${SCRAPER_URL}
      REPORT_EMAIL_TO: ${REPORT_EMAIL_TO}

      # ---- API keys adicionales (agregar según sources.yml) ---------------
      # EJEMPLO_API_KEY: ${EJEMPLO_API_KEY}

      # ---- Misc -----------------------------------------------------------
      N8N_LOG_LEVEL: info

      # ---- Seguridad: permite que el MCP server llame a la API local ------
      # El MCP server interno de n8n hace llamadas a localhost:5678/api/...
      # Sin esto, la SSRF protection bloquea esas llamadas.
      N8N_BLOCK_NON_PUBLIC_IP: "false"

      # ---- Permite acceder a $env en expresiones de nodos -----------------
      # n8n 2.x bloquea $env por defecto. Necesario para que los nodos HTTP
      # puedan leer SCRAPER_URL, SUPABASE_URL, SUPABASE_ANON_KEY, etc.
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
    volumes:
      # Persistencia de workflows, credenciales (encriptadas con la key de
      # arriba), ejecuciones e historial. NO se commitea — vive en el host.
      - ./n8n_data:/home/node/.n8n
    networks:
      - bimeg-net
    depends_on:
      scraper-service:
        condition: service_healthy

  # ==========================================================================
  # scraper-service — FastAPI + Playwright (red interna, sin puerto público)
  # ==========================================================================
  scraper-service:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: bimeg-scraper
    restart: always
    # Puerto expuesto al host para desarrollo (Swagger UI en localhost:8000/docs)
    ports:
      - "8000:8000"
    environment:
      # ---- API keys de proveedores (agregar según sources.yml) ------------
      # EJEMPLO_API_KEY: ${EJEMPLO_API_KEY}
      TZ: ${TZ}
    volumes:
      # Config de fuentes montada read-only.
      - ./sources.yml:/app/sources.yml:ro
    networks:
      - bimeg-net
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ==========================================================================
  # postgres — base de datos LOCAL (solo en modo dev)
  # ==========================================================================
  # Se activa solo con: docker-compose --profile local up -d
  # En producción este servicio NO se levanta — la DB vive en Supabase cloud.
  # ==========================================================================
  postgres:
    image: postgres:17-alpine
    container_name: bimeg-postgres
    restart: always
    profiles: ["local"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      TZ: ${TZ}
    volumes:
      # Persistencia de datos en el host.
      - ./postgres_data:/var/lib/postgresql/data

      # Scripts de inicialización (se ejecutan en orden alfabético la PRIMERA
      # vez que arranca el container). Si cambiás el schema, hay que borrar
      # ./postgres_data para que se re-ejecuten.
      - ./db/schema.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
      - ./db/init-local.sql:/docker-entrypoint-initdb.d/01-init-local.sql:ro
    networks:
      - bimeg-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # postgrest — API REST sobre postgres (espejo local de Supabase API)
  # ==========================================================================
  # Expone la misma interfaz REST que Supabase (PostgreSQL + PostgREST).
  # n8n le habla por http://postgrest:3000 con los mismos headers que usaría
  # con Supabase cloud.
  # ==========================================================================
  postgrest:
    image: postgrest/postgrest:v14.10
    container_name: bimeg-postgrest
    restart: always
    profiles: ["local"]
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      # JWT secret para validar el token en SUPABASE_ANON_KEY.
      # Debe coincidir con el secret usado para generar el JWT local.
      PGRST_JWT_SECRET: "super-secret-local-jwt-key-bimeg-2026"
    networks:
      - bimeg-net
    depends_on:
      postgres:
        condition: service_healthy

  # ==========================================================================
  # adminer — UI web para explorar la base de datos local (solo en modo dev)
  # ==========================================================================
  # Acceder en: http://localhost:8080
  #   Sistema:   PostgreSQL
  #   Servidor:  postgres
  #   Usuario:   postgres (o el valor de POSTGRES_USER)
  #   Contraseña: ver .env → POSTGRES_PASSWORD
  #   Base de datos: postgres
  # ==========================================================================
  adminer:
    image: adminer:4.8.1
    container_name: bimeg-adminer
    restart: always
    profiles: ["local"]
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    networks:
      - bimeg-net
    depends_on:
      postgres:
        condition: service_healthy


# ============================================================================
# Red interna privada
# Los servicios se resuelven entre sí por hostname (= nombre del servicio):
#   n8n → scraper-service:8000
#   n8n → postgrest:3000         (modo local)
#   postgrest → postgres:5432    (modo local)
# ============================================================================
networks:
  bimeg-net:
    driver: bridge
